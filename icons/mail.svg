<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Win95 pixel mail icon -->
  <rect width="32" height="32" fill="none"/>
  <!-- Envelope body -->
  <rect x="2" y="7" width="28" height="18" fill="#ffffff"/>
  <rect x="2" y="7" width="28" height="1" fill="#808080"/>
  <rect x="2" y="24" width="28" height="1" fill="#808080"/>
  <rect x="2" y="7"  width="1" height="18" fill="#808080"/>
  <rect x="29" y="7" width="1" height="18" fill="#808080"/>
  <!-- Flap lines (V shape) -->
  <rect x="2"  y="7"  width="15" height="1" fill="#000080"/>
  <rect x="15" y="7"  width="15" height="1" fill="#000080"/>
  <!-- Diagonal fold lines -->
  <rect x="2"  y="8"  width="2" height="1" fill="#000080"/>
  <rect x="4"  y="9"  width="2" height="1" fill="#000080"/>
  <rect x="6"  y="10" width="2" height="1" fill="#000080"/>
  <rect x="8"  y="11" width="2" height="1" fill="#000080"/>
  <rect x="10" y="12" width="2" height="1" fill="#000080"/>
  <rect x="12" y="13" width="2" height="1" fill="#000080"/>
  <rect x="14" y="14" width="4" height="1" fill="#000080"/>
  <rect x="18" y="13" width="2" height="1" fill="#000080"/>
  <rect x="20" y="12" width="2" height="1" fill="#000080"/>
  <rect x="22" y="11" width="2" height="1" fill="#000080"/>
  <rect x="24" y="10" width="2" height="1" fill="#000080"/>
  <rect x="26" y="9"  width="2" height="1" fill="#000080"/>
  <rect x="28" y="8"  width="2" height="1" fill="#000080"/>
</svg>
