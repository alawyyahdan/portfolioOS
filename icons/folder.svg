<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Win95 pixel folder icon -->
  <rect width="32" height="32" fill="none"/>
  <!-- Folder body -->
  <rect x="2" y="10" width="28" height="20" fill="#ffcc00"/>
  <rect x="2" y="10" width="28" height="1" fill="#cc9900"/>
  <rect x="29" y="10" width="1" height="20" fill="#cc9900"/>
  <rect x="2" y="29" width="28" height="1" fill="#cc9900"/>
  <!-- Folder tab -->
  <rect x="2" y="7" width="10" height="4" fill="#ffcc00"/>
  <rect x="2" y="7" width="10" height="1" fill="#cc9900"/>
  <rect x="11" y="7" width="1" height="4" fill="#cc9900"/>
  <!-- Lines on folder -->
  <rect x="6" y="15" width="16" height="2" fill="#cc9900" opacity="0.5"/>
  <rect x="6" y="19" width="20" height="2" fill="#cc9900" opacity="0.5"/>
  <rect x="6" y="23" width="12" height="2" fill="#cc9900" opacity="0.5"/>
  <!-- Shine -->
  <rect x="3" y="11" width="26" height="1" fill="#ffee66" opacity="0.6"/>
</svg>
