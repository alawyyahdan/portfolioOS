<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Win95 pixel recycle bin icon -->
  <rect width="32" height="32" fill="none"/>
  <!-- Bin body (trapezoid via rects) -->
  <rect x="7"  y="12" width="18" height="16" fill="#ffffff"/>
  <rect x="8"  y="13" width="16" height="14" fill="#c0e0ff"/>
  <!-- Bin left side slope -->
  <rect x="6"  y="13" width="2" height="14" fill="#ffffff"/>
  <rect x="24" y="13" width="2" height="14" fill="#ffffff"/>
  <!-- Bin stripes -->
  <rect x="10" y="15" width="2" height="10" fill="#4080ff" opacity="0.4"/>
  <rect x="15" y="15" width="2" height="10" fill="#4080ff" opacity="0.4"/>
  <rect x="20" y="15" width="2" height="10" fill="#4080ff" opacity="0.4"/>
  <!-- Border -->
  <rect x="6"  y="12" width="20" height="1" fill="#404040"/>
  <rect x="6"  y="27" width="20" height="1" fill="#404040"/>
  <rect x="5"  y="12" width="1" height="16" fill="#404040"/>
  <rect x="26" y="12" width="1" height="16" fill="#404040"/>
  <!-- Lid -->
  <rect x="4"  y="9"  width="24" height="3" fill="#c0c0c0"/>
  <rect x="4"  y="9"  width="24" height="1" fill="#ffffff"/>
  <rect x="4"  y="11" width="24" height="1" fill="#808080"/>
  <!-- Handle -->
  <rect x="13" y="6"  width="6"  height="4" fill="#c0c0c0"/>
  <rect x="13" y="6"  width="6"  height="1" fill="#808080"/>
  <rect x="13" y="9"  width="6"  height="1" fill="#ffffff"/>
  <rect x="13" y="6"  width="1" height="4" fill="#808080"/>
  <rect x="18" y="6"  width="1" height="4" fill="#ffffff"/>
</svg>
